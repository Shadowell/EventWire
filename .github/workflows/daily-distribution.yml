name: Daily Distribution

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  publish-daily-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Dry-run daily distribution
        run: node scripts/daily-distribution.mjs
        env:
          LEMON_SQUEEZY_CHECKOUT_URL: ${{ secrets.LEMON_SQUEEZY_CHECKOUT_URL }}
